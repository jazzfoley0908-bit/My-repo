<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Jokes Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>😂 Funny Jokes Generator 😂</h1>
            <p>Get a laugh with random jokes!</p>
        </div>

        <div class="joke-card">
            <div class="joke-content">
                <p id="jokeText">Click the button to get a joke!</p>
            </div>
        </div>

        <div class="button-container">
            <button id="newJokeBtn" class="btn">Get New Joke</button>
        </div>

        <div class="footer">
            <p>Keep laughing! 🎉</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
